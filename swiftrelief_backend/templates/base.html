<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}Ambulance AI System{% endblock %}</title>


<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
.pulse {
animation: pulse 1.6s infinite;
}
@keyframes pulse {
0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
70% { box-shadow: 0 0 0 25px rgba(239,68,68,0); }
100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
</style>
</head>
<body class="bg-slate-100 min-h-screen">


<header class="bg-blue-700 text-white p-4 flex justify-between items-center">
<h1 class="text-lg font-bold">🚑 Ambulance AI Recommendation</h1>
<nav class="space-x-4">
<a href="/dashboard" class="hover:underline">Dashboard</a>
<a href="/recommend" class="hover:underline">Explainability</a>
<a href="/login" class="hover:underline">Logout</a>
</nav>
</header>


<main class="p-6">
{% block content %}{% endblock %}
</main>


<!-- Emergency Confirmation Modal -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl shadow-xl w-[360px] text-center">
<h2 class="text-xl font-bold text-red-600 mb-2">🚑 Emergency Sent</h2>
<p id="confirmText" class="text-sm text-gray-600 mb-4"></p>
<button onclick="closeConfirm()" class="bg-blue-600 text-white px-4 py-2 rounded">OK</button>
</div>
</div>


</body>
</html>
