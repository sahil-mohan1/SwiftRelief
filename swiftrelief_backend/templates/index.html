<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Route System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-rose-50 via-white to-white text-slate-800 min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute -top-32 -left-24 h-80 w-80 rounded-full bg-red-100/70 blur-3xl"></div>
        <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-rose-100/70 blur-3xl"></div>
    </div>

    <div class="relative max-w-3xl w-full">
        <div class="mx-auto w-full max-w-2xl rounded-3xl border border-red-100 bg-white/90 p-10 shadow-2xl shadow-red-100/60 backdrop-blur">
        <div class="mb-6 inline-block p-4 bg-red-600 rounded-2xl shadow-lg shadow-red-200 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-slate-900">SwiftRelief</h1>
        <p class="text-lg text-slate-600 mb-10 leading-relaxed">Instant emergency routing and hospital recommendations based on your unique medical profile.</p>
        
        <div id="authControls" class="flex gap-4 justify-center">
            <a href="/login" class="bg-white text-slate-900 px-8 py-3 rounded-xl font-semibold border border-slate-200 hover:border-red-300 hover:text-red-600 transition">Login</a>
            <a href="/register" class="bg-red-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-red-700 transition shadow-lg shadow-red-200">Register</a>
        </div>
        </div>
        <p class="mt-6 text-sm text-slate-500">Built for faster critical care decisions.</p>
        </div>

    <script>
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
