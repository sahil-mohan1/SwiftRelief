<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SwiftRelief</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-rose-50 via-white to-white min-h-screen">

    <nav class="bg-white/95 border-b border-red-100 h-[70px] px-6 flex items-center justify-between sticky top-0 z-[1002] backdrop-blur-sm">
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="font-bold text-red-600 text-xl">SwiftRelief</a>
            <span class="text-slate-400 text-sm">Profile</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="goDashboard()" class="text-slate-700 font-medium px-3 py-2 rounded-xl hover:bg-rose-50">Back</button>
            <button onclick="logout()" class="text-slate-500 font-medium px-3 py-2 rounded-xl hover:bg-rose-50">Logout</button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto p-6">
        <div class="bg-white rounded-3xl border border-red-100 shadow-2xl shadow-red-100/50 p-6">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Your Health Profile</h2>
                    <p class="text-sm text-slate-500 mt-1">Update your details. Past recommendation runs will not change because each run stores its own profile snapshot.</p>
                </div>
                <span class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-red-50 text-red-600 font-bold">👤</span>
            </div>

            <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-700">Name</label>
                    <input id="name" type="text" class="mt-2 w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-400 outline-none" placeholder="Full name">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-700">Email</label>
                    <input id="email" type="email" class="mt-2 w-full p-3 border border-slate-300 rounded-xl bg-slate-50" disabled>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-700">Age <span class="text-red-600">*</span></label>
                    <input id="age" type="number" min="0" max="120" class="mt-2 w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-400 outline-none" required>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-700">Gender <span class="text-red-600">*</span></label>
                    <select id="gender" class="mt-2 w-full p-3 border border-slate-300 rounded-xl bg-white focus:ring-2 focus:ring-red-500 focus:border-red-400 outline-none" required>
                        <option value="Other">Other</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="mt-6">
                <p class="text-xs font-semibold text-slate-700">Medical complications (optional)</p>
                <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_asthma_copd" class="h-4 w-4">Asthma / COPD</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_diabetes" class="h-4 w-4">Diabetes</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_heart" class="h-4 w-4">Heart disease</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_stroke" class="h-4 w-4">Stroke history</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_epilepsy" class="h-4 w-4">Epilepsy</label>
                    <label class="flex items-center gap-2"><input type="checkbox" id="cond_pregnant" class="h-4 w-4">Pregnant</label>
                </div>
            </div>

            <div class="mt-6">
                <label class="text-xs font-semibold text-slate-700">Search preference</label>
                <div class="mt-2 text-sm">
                    <label class="flex items-center gap-3">
                        <input id="pref_use_category" type="checkbox" class="h-4 w-4">
                        <span>Prefer category selector (instead of symptom input)</span>
                    </label>
                    <p class="text-xs text-slate-500 mt-1">When enabled, the dashboard shows a category dropdown. Otherwise you can type free-text symptoms.</p>
                </div>
            </div>

            <div class="mt-6">
                <label class="text-xs font-semibold text-slate-700">Other notes (optional)</label>
                <textarea id="other_info" rows="3" class="mt-2 w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-400 outline-none" placeholder="Any other relevant info (e.g., allergies, accessibility needs)"></textarea>
            </div>

            <div class="mt-6 flex items-center justify-end gap-3">
                <button onclick="goDashboard()" class="px-4 py-2 rounded-xl text-sm bg-slate-100 hover:bg-slate-200">Cancel</button>
                <button id="saveBtn" onclick="saveProfile()" class="px-4 py-2 rounded-xl text-sm bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-200">Save</button>
            </div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('token')) window.location.href = '/login';

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
        function goDashboard(){
            window.location.href = '/dashboard';
        }

        async function loadProfile() {
            const res = await fetch('/api/profile', {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            const out = await res.json();
            if (!out.success) throw new Error(out.message || 'Failed to load profile');
            const p = out.profile;
            document.getElementById('name').value = p.name || '';
            document.getElementById('email').value = p.email || '';
            document.getElementById('age').value = (p.age !== null && p.age !== undefined) ? p.age : '';
            document.getElementById('gender').value = p.gender || 'Other';
            const c = p.conditions || {};
            document.getElementById('cond_asthma_copd').checked = !!c.asthma_copd;
            document.getElementById('cond_diabetes').checked = !!c.diabetes;
            document.getElementById('cond_heart').checked = !!c.heart_disease;
            document.getElementById('cond_stroke').checked = !!c.stroke_history;
            document.getElementById('cond_epilepsy').checked = !!c.epilepsy;
            document.getElementById('cond_pregnant').checked = !!c.pregnant;
            document.getElementById('other_info').value = p.other_info || '';
            // Load local preference for category selector
            try {
                const val = localStorage.getItem('use_category_selector');
                document.getElementById('pref_use_category').checked = (val === '1');
            } catch (e) {}
        }

        async function saveProfile() {
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            if (age === '' || age === null) return alert('Age is required');
            if (!gender) return alert('Gender is required');

            const payload = {
                name: document.getElementById('name').value,
                age,
                gender,
                conditions: {
                    asthma_copd: document.getElementById('cond_asthma_copd').checked,
                    diabetes: document.getElementById('cond_diabetes').checked,
                    heart_disease: document.getElementById('cond_heart').checked,
                    stroke_history: document.getElementById('cond_stroke').checked,
                    epilepsy: document.getElementById('cond_epilepsy').checked,
                    pregnant: document.getElementById('cond_pregnant').checked
                },
                other_info: document.getElementById('other_info').value
            };

            // Persist the dashboard preference locally (web only)
            try {
                const useCat = document.getElementById('pref_use_category').checked === true;
                localStorage.setItem('use_category_selector', useCat ? '1' : '0');
            } catch (e) {}

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify(payload)
                });
                const out = await res.json();
                if (!out.success) throw new Error(out.message || 'Failed to save');
                alert('Profile updated');
                goDashboard();
            } catch (e) {
                alert(e.message || String(e));
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save';
            }
        }

        loadProfile().catch(e => alert(e.message || String(e)));
    </script>

</body>
</html>
